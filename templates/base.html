<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page_title or 'Skripsi Dashboard' }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='vendors/font-awesome/css/font-awesome.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap-dashboard.css', v='20260420c') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/app-custom.css', v='20260427a') }}">
    <link rel="shortcut icon" href="{{ url_for('static', filename='images/favicon.png') }}">
  </head>
  <body class="app-body">
    <div class="app-shell">
      <aside class="app-sidebar app-sidebar-desktop">
        {% include '_sidebar.html' %}
      </aside>

      <main class="app-main">
        <div class="app-content" id="appContent">
          {% block content %}{% endblock %}
        </div>
      </main>
    </div>

    <div class="app-modal" id="batchPreviewModal" hidden>
      <div class="app-modal-backdrop" data-modal-close></div>
      <div class="app-modal-dialog">
        <button class="app-modal-close" type="button" data-modal-close aria-label="Close">&times;</button>
        <div class="app-modal-body" id="batchPreviewModalBody"></div>
      </div>
    </div>

    <script src="{{ url_for('static', filename='vendors/chart.js/chart.umd.js') }}"></script>
    <script>
      document.addEventListener('DOMContentLoaded', () => {
        const appContent = document.getElementById('appContent');
        const batchPreviewModal = document.getElementById('batchPreviewModal');
        const batchPreviewModalBody = document.getElementById('batchPreviewModalBody');
        let searchTimer = null;
        let activeCharts = [];

        if (!appContent) {
          return;
        }

        const updateActiveSidebar = (activePage) => {
          document.querySelectorAll('.sidebar-link[data-page]').forEach((link) => {
            const isActive = activePage && link.dataset.page === activePage;
            link.classList.toggle('active', isActive);
          });
        };

        const initializeCharts = () => {
          if (typeof Chart === 'undefined') {
            return;
          }

          activeCharts.forEach((chart) => chart.destroy());
          activeCharts = [];

          appContent.querySelectorAll('[data-classification-chart]').forEach((chartCanvas) => {
            const labels = JSON.parse(chartCanvas.dataset.labels || '[]');
            const values = JSON.parse(chartCanvas.dataset.values || '[]');

            if (!labels.length || !values.length) {
              return;
            }

            const chart = new Chart(chartCanvas, {
              type: 'pie',
              data: {
                labels,
                datasets: [
                  {
                    data: values,
                    backgroundColor: ['#1f6feb', '#2da44e', '#f59e0b', '#ef4444', '#8b5cf6', '#06b6d4'],
                    borderWidth: 0,
                  }
                ]
              },
              options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                  legend: {
                    position: 'bottom'
                  }
                }
              }
            });
            activeCharts.push(chart);
          });
        };

        const closeModal = () => {
          if (!batchPreviewModal) {
            return;
          }
          batchPreviewModal.hidden = true;
          batchPreviewModalBody.innerHTML = '';
        };

        const openModal = (html) => {
          if (!batchPreviewModal) {
            return;
          }
          batchPreviewModalBody.innerHTML = html;
          batchPreviewModal.hidden = false;
        };

        const applyFragment = (html, url, pushState = true) => {
          appContent.innerHTML = html;
          const fragment = appContent.querySelector('.page-fragment');
          if (!fragment) {
            window.location.href = url;
            return;
          }

          const pageTitle = fragment.dataset.pageTitle;
          const activePage = fragment.dataset.activePage;

          if (pageTitle) {
            document.title = pageTitle;
          }

          updateActiveSidebar(activePage);
          initializeCharts();

          if (pushState) {
            window.history.pushState({ url }, '', url);
          }
        };

        const fetchContent = async (url, pushState = true) => {
          appContent.classList.add('is-loading');

          try {
            const response = await fetch(url, {
              headers: {
                'X-Requested-With': 'XMLHttpRequest'
              }
            });

            if (!response.ok) {
              throw new Error(`Request failed with status ${response.status}`);
            }

            const html = await response.text();
            applyFragment(html, url, pushState);
          } catch (error) {
            window.location.href = url;
          } finally {
            appContent.classList.remove('is-loading');
          }
        };

        document.addEventListener('click', (event) => {
          const link = event.target.closest('a[data-ajax-nav="true"]');
          if (!link) {
            return;
          }

          const href = link.getAttribute('href');
          if (!href || href === '#' || link.target === '_blank' || link.hasAttribute('download')) {
            return;
          }

          const url = new URL(link.href, window.location.origin);
          const isSameOrigin = url.origin === window.location.origin;
          if (!isSameOrigin) {
            return;
          }

          event.preventDefault();
          fetchContent(url.toString());
        }, true);

        document.addEventListener('click', async (event) => {
          const previewButton = event.target.closest('[data-preview-url]');
          if (previewButton) {
            event.preventDefault();
            try {
              const response = await fetch(previewButton.dataset.previewUrl, {
                headers: {
                  'X-Requested-With': 'XMLHttpRequest'
                }
              });
              if (!response.ok) {
                throw new Error('Preview request failed');
              }
              openModal(await response.text());
            } catch (error) {
              openModal('<p class="text-muted mb-0">Preview data tidak bisa dimuat.</p>');
            }
            return;
          }

          if (event.target.closest('[data-modal-close]')) {
            closeModal();
          }
        });

        document.addEventListener('input', (event) => {
          const input = event.target.closest('[data-live-search-input]');
          if (!input) {
            return;
          }

          const form = input.closest('[data-live-search-form]');
          if (!form) {
            return;
          }

          const value = input.value.trim();
          if (value.length > 0 && value.length < 3) {
            return;
          }

          clearTimeout(searchTimer);
          searchTimer = window.setTimeout(() => {
            const url = new URL(form.action, window.location.origin);
            if (value) {
              url.searchParams.set('q', value);
            } else {
              url.searchParams.delete('q');
            }
            fetchContent(url.toString());
          }, 250);
        });

        document.addEventListener('submit', (event) => {
          const form = event.target.closest('[data-live-search-form]');
          if (!form) {
            return;
          }

          event.preventDefault();
          const url = new URL(form.action, window.location.origin);
          const input = form.querySelector('[data-live-search-input]');
          const value = input ? input.value.trim() : '';

          if (value) {
            url.searchParams.set('q', value);
          } else {
            url.searchParams.delete('q');
          }

          fetchContent(url.toString());
        });

        window.addEventListener('popstate', () => {
          fetchContent(window.location.href, false);
        });

        initializeCharts();
      });
    </script>
  </body>
</html>
